name: integracao-continua

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  compilar-testar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependencias
        run: dotnet restore

      - name: Compilar
        run: dotnet build --configuration Release --no-restore

      - name: Executar testes
        run: dotnet test --configuration Release --no-build --verbosity normal

  validar-hml-docker:
    runs-on: ubuntu-latest
    needs: compilar-testar

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Subir ambiente de homologacao
        run: docker compose up -d --build

      - name: Executar smoke test funcional
        shell: pwsh
        run: ./scripts/validar-hml.ps1 -BaseUrl "http://localhost:8080"

      - name: Coletar logs da API em caso de falha
        if: failure()
        run: docker compose logs --no-color api

      - name: Encerrar ambiente de homologacao
        if: always()
        run: docker compose down -v
