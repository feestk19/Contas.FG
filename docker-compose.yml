services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: contas-feege-sqlserver-hml
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-SenhaForte123!}
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q \"SELECT 1\" || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/Contas.FeEGe.Api/Dockerfile
    container_name: contas-feege-api-hml
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Homologacao
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=${SQLSERVER_DATABASE:-CONTASFEEGE_HOMOLOG};User Id=sa;Password=${MSSQL_SA_PASSWORD:-SenhaForte123!};TrustServerCertificate=True;Encrypt=False;
      Jwt__Issuer: Contas.FeEGe.Homologacao
      Jwt__Audience: Contas.FeEGe.Homologacao
      Jwt__Key: ${JWT_KEY:-CHAVE_HOMOLOGACAO_TROCAR_ANTES_DE_PRODUCAO}
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  sqlserver_data:
